<a
	id="{{ $id }}"
	hrefprefix="{{ this.componentAttribs.hrefprefix || '' }}" 
	href="{{ this.componentAttribs.href || (this.componentAttribs.hrefprefix + encodeURIComponent(require(path.join(this.routeFile, '..', 'translations', 'util')).getValue(this.routePath, 'aiDropdown.prompts.home'))) }}"
	onclick="{{ this.componentAttribs.href?.startsWith('javascript:') ? '' : 'playAudio(\'haptic\');' }} haptic('click'); closeDropdown(true)"
	target="{{ this.componentAttribs.href?.startsWith('javascript:') ? '' : '_blank' }}"
	class="aiChoiceDropdownButton transform hover:scale-[1.015] dropdown-item flex items-center justify-between px-4 py-2.5 gap-2 text-primary-content hover:bg-light-background transition-all duration-200"
>
	<div class="flex items-center gap-1.5">
		<svg class="AiBrandIcon transition-all duration-300" width="18" height="18" viewBox="0 0 24 24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
			{{ $svgPath }}
		</svg>
		<span class="AiBrandLabel text-[13px]">{{ $label }}</span>
	</div>
	<div class="AiOpenIcon {{ this.componentAttribs.href?.startsWith('javascript:') ? 'hidden' : '' }}">
		<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
			<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
		</svg>
	</div>
</a>
