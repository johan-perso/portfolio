<!DOCTYPE html>
<html lang="{{ globalThis.detectLang(this.routePath) }}" class="bg-primary-background scroll-smooth">
<head>
	<DefaultHead></DefaultHead>
	<title>%%BLOG_METADATA_TITLE%%</title>
	<meta name="title" content="%%BLOG_METADATA_TITLE%%">
	<meta property="og:title" content="%%BLOG_METADATA_TITLE%%">
	<meta name="twitter:title" content="%%BLOG_METADATA_TITLE%%">

	<meta name="description" content="%%BLOG_METADATA_DESCRIPTION%%">
	<meta property="og:description" content="%%BLOG_METADATA_DESCRIPTION%%">
	<meta name="twitter:description" content="%%BLOG_METADATA_DESCRIPTION%%">

	<meta name="twitter:creator" content="@johan_stickman">
	<meta property="og:type" content="article">
	<meta property="og:url" content="%%BLOG_METADATA_URL%%">
	<meta property="article:author" content="%%BLOG_METADATA_AUTHOR%%">
	<meta property="article:published_time" content="%%BLOG_METADATA_PUBLISHED_TIME%%">

	%%BLOG_METADATA_IMAGES_HTML%%
	%%CANONICAL_TAG%%

	<meta name="robots" content="%%BLOG_ROBOTS_RULES%%">
	<script src="/main.js"></script>

	<link rel="preload" href="/fonts/ibm-plex-serif-v20-latin-600.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/noto-serif-v33-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/noto-serif-v33-latin-italic.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/noto-serif-v33-latin-500.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/noto-serif-v33-latin-600.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/bricolage-grotesque-v9-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/bricolage-grotesque-v9-latin-500.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/bricolage-grotesque-v9-latin-600.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/fonts/schibsted-grotesk-v7-latin-800.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body class="font-body text-sm leading-5">
	<JsRequired></JsRequired>
	<Loader></Loader>

	<div class="appContainer 2xl:px-12 pt-14 max-[1219px]:grid-cols-1">
		<!-- Description about myself -->
		<MyselfSidebar class="max-[1219px]:hidden"></MyselfSidebar>

		<!-- Main page content -->
		<div id="mainContent" class="text-primary-content pr-8 2xl:pr-4 pb-16 max-[1219px]:px-40 max-[1186px]:px-24 max-[900px]:px-12 w-full" role="main">
			<GoBackButton></GoBackButton>

			<div class="flex flex-row items-start row-span-2 gap-10 max-md:flex-col w-full justify-between">
				<!-- Article content -->
				<div role="article" class="blogPost leading-normal w-full max-w-[50rem] break-words min-w-0">
					<h1 class="font-semibold text-primary-content-heavy antialiased text-[27px] leading-8" role="heading">%%BLOG_TITLE%%</h1>
					%%BLOG_BANNER%%

					%%BLOG_CONTENT%%
				</div>

				<!-- Article details and Table of Content -->
				<div class="md:sticky top-6 bottom-6 self-start mt-0.5 pb-12 md:ml-auto max-md:mt-14 w-full sm:max-md:max-w-[80%] md:max-w-52 max-md:w-fit text-primary-content h-fit max-h-[100vh] overflow-y-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
					<ArticleDetails
						readTimeMin="%%BLOG_DETAILS_READ_TIME%%"
						editAbsoluteDate="%%BLOG_DETAILS_EDIT_DATE%%"
						releaseAbsoluteDate="%%BLOG_DETAILS_RELEASE_DATE%%"
						releaseRelativeDate="%%BLOG_DETAILS_RELEASE_RELATIVE_DATE%%"

						projectPeriod="%%BLOG_DETAILS_PROJECT_PERIOD%%"
						projectStack="%%BLOG_DETAILS_PROJECT_THEME%%"
						projectAuthor="%%BLOG_DETAILS_PROJECT_AUTHOR%%"
						projectCoAuthors="%%BLOG_DETAILS_PROJECT_COAUTHORS%%"

						linkSourceCode="%%BLOG_DETAILS_LINK_SOURCECODE%%"
						linkDemo="%%BLOG_DETAILS_LINK_DEMO%%"
						linkAndroid="%%BLOG_DETAILS_LINK_ANDROID%%"
						linkIos="%%BLOG_DETAILS_LINK_IOS%%"
						linkWindows="%%BLOG_DETAILS_LINK_WINDOWS%%"
						linkMacOS="%%BLOG_DETAILS_LINK_MACOS%%"
						linkLinux="%%BLOG_DETAILS_LINK_LINUX%%"
					></ArticleDetails>

					<div class="hidden md:block">
						%%BLOG_TOC%%
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
